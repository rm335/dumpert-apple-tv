<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0" stop-color="#0E1013"/>
      <stop offset="1" stop-color="#191C20"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7BCB3A"/>
      <stop offset="1" stop-color="#4E9624"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect x="0" y="0" width="10" height="640" fill="#65B32E"/>

  <!-- right: video / Apple TV tile motif -->
  <rect x="846" y="156" width="328" height="328" rx="72" fill="#65B32E" opacity="0.16"/>
  <rect x="862" y="172" width="296" height="296" rx="64" fill="url(#tile)"/>
  <polygon points="985,255 985,385 1085,320" fill="#FFFFFF"/>

  <!-- left: text column -->
  <rect x="92" y="92" width="170" height="40" rx="20" fill="none" stroke="#65B32E" stroke-width="2"/>
  <text x="177" y="119" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" letter-spacing="3" fill="#65B32E" text-anchor="middle">UNOFFICIAL</text>

  <text x="90" y="252" font-family="Helvetica, Arial, sans-serif" font-size="96" font-weight="700" letter-spacing="-2" fill="#FFFFFF">Dumpert<tspan fill="#65B32E">TV</tspan></text>

  <text x="92" y="318" font-family="Helvetica, Arial, sans-serif" font-size="33" font-weight="400" fill="#AEB6BF">Unofficial Dumpert client for Apple TV</text>

  <text x="92" y="392" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="600" fill="#7E868F">tvOS 18+&#160;&#160;&#183;&#160;&#160;Swift 6&#160;&#160;&#183;&#160;&#160;SwiftUI&#160;&#160;&#183;&#160;&#160;CloudKit&#160;&#160;&#183;&#160;&#160;SharePlay</text>

  <text x="92" y="556" font-family="Helvetica, Arial, sans-serif" font-size="23" font-weight="600" fill="#9AA1A9">Open source &#183; MIT &#183; github.com/rm335/dumpert-apple-tv</text>
  <text x="92" y="590" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="400" fill="#646B73">Not affiliated with Dumpert or DPG Media B.V.</text>
</svg>
